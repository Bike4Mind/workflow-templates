name: Overlay Release (reusable)

# Reusable auto-release for Bike4Mind premium overlays. On the caller's push to
# main, computes the next SemVer from conventional-commit subjects since the last
# SemVer tag, then cuts <tag_prefix><MAJOR.MINOR.PATCH> + a GitHub Release. No-ops
# when no commit since the last tag is release-worthy.
#
# Bump rules mirror bike4mind core's auto-changeset.yml (max across commits):
#   type!: / type(scope)!: -> major | feat -> minor | fix|perf|refactor -> patch
#   everything else (chore/docs/ci/.../non-conventional) is ignored.
#
# Tag scheme: <tag_prefix>MAJOR.MINOR.PATCH (SemVer), e.g. v0.2.0. Legacy CalVer
# tags (vYYYY.MM.DD.N) are ignored by the strict-SemVer "last tag" filter and
# left in place as history.
#
# The bump math lives in scripts/compute-next-semver.sh (unit-tested via
# scripts-ci). This job checks out that script from workflow-templates at
# github.job_workflow_sha so it always matches the ref the caller pinned.
#
# Runner: caller's vars.RUNNER_LABEL (self-hosted fleet); ubuntu-latest fallback.
# Auth: automatic GITHUB_TOKEN with contents: write (overlays have no
# tag-protection ruleset, so GITHUB_TOKEN may create tags/releases directly).
#
# Caller shim is UNCHANGED (.github/workflows/release.yml in the overlay repo):
#   name: Release
#   on: { push: { branches: [main] } }
#   permissions: { contents: write }
#   jobs:
#     release:
#       uses: Bike4Mind/workflow-templates/.github/workflows/overlay-release.yml@main

on:
  workflow_call:
    inputs:
      tag_prefix:
        description: Prefix placed before the version in the tag/release name.
        required: false
        type: string
        default: v

concurrency:
  # Serialize releases per overlay so two quick merges don't race on "next".
  group: overlay-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    permissions:
      contents: write
    steps:
      - name: Checkout overlay (full history + tags)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch the version script from workflow-templates
        uses: actions/checkout@v6
        with:
          repository: Bike4Mind/workflow-templates
          ref: ${{ github.job_workflow_sha }}
          path: .workflow-templates
          sparse-checkout: scripts

      - name: Compute next version and release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_PREFIX: ${{ inputs.tag_prefix }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Highest strict-SemVer tag (ignores legacy CalVer vYYYY.MM.DD.N).
          LAST_VERSION="$(git tag -l "${TAG_PREFIX}*" \
            | sed "s/^${TAG_PREFIX}//" \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1 || true)"

          if [ -n "$LAST_VERSION" ]; then
            RANGE="${TAG_PREFIX}${LAST_VERSION}..HEAD"
            echo "Last SemVer tag: ${TAG_PREFIX}${LAST_VERSION}"
          else
            RANGE="HEAD"
            LAST_VERSION="0.0.0"
            echo "No SemVer tag yet; baseline ${LAST_VERSION}"
          fi

          NEXT="$(git log "$RANGE" --pretty=%s \
            | bash .workflow-templates/scripts/compute-next-semver.sh "$LAST_VERSION")"

          if [ -z "$NEXT" ]; then
            echo "::notice::No release-worthy commits in ${RANGE}; skipping."
            exit 0
          fi

          TAG="${TAG_PREFIX}${NEXT}"
          echo "Creating release ${TAG} at ${SHA}"
          gh release create "${TAG}" \
            --target "${SHA}" \
            --title "${TAG}" \
            --generate-notes
