name: scripts-ci

on:
  pull_request:
    paths: ['scripts/**']

permissions:
  contents: read

jobs:
  test-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run compute-next-semver tests
        run: bash scripts/tests/compute-next-semver.test.sh
